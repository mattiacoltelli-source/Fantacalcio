<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="description" content="Assistente asta fantacalcio 2025/26" />
  <title>FantAssist 2025/26</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=15" />
</head>
<body>


<div class="app-container">


  <header class="app-header">
    <div class="header-top">
      <div>
        <div class="app-title">⚽ FantAssist</div>
        <div class="app-subtitle">Asta 2025 / 2026</div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" onclick="App.exportBackup()" title="Esporta backup">💾</button>
        <button class="btn-icon" onclick="document.getElementById('import-file').click()" title="Importa backup">📂</button>
        <input type="file" id="import-file" accept=".json" style="display:none"
          onchange="App.importBackup(this.files[0]); this.value='';" />
        <button class="btn-reset" onclick="App.resetAll()">Reset</button>
      </div>
    </div>
  </header>


  <div id="budget-bar"></div>


  <div class="settings-bar">
    <label>
      Budget
      <input type="number" id="setting-budget" value="250" min="1" max="9999"
        onchange="App.updateBudget(parseInt(this.value))" />
      cr
    </label>
    <label>
      Modulo
      <select id="setting-formation" onchange="App.updateFormation(this.value)">
        <option value="3-4-3">3-4-3</option>
        <option value="4-3-3">4-3-3</option>
        <option value="4-4-2">4-4-2</option>
        <option value="3-5-2">3-5-2</option>
        <option value="4-5-1">4-5-1</option>
        <option value="5-3-2">5-3-2</option>
      </select>
    </label>
  </div>


  <nav class="tabs">
    <button class="tab-btn active" data-tab="players"   onclick="App.setTab('players')">🔍 Giocatori</button>
    <button class="tab-btn"        data-tab="watchlist" onclick="App.setTab('watchlist')">⭐ Watchlist</button>
    <button class="tab-btn"        data-tab="squad"     onclick="App.setTab('squad')">📋 Rosa</button>
  </nav>


  <!-- VIEW: GIOCATORI -->
  <div id="view-players">
    <div class="filters-bar">
      <div class="filters-row">
        <input type="text" id="search-input" class="search-input"
          placeholder="Cerca giocatore o squadra..."
          oninput="App.setFilter('search', this.value)" />
      </div>
      <div class="filters-row">
        <select id="filter-role" class="filter-select" onchange="App.setFilter('role', this.value)">
          <option value="ALL">Tutti i ruoli</option>
          <option value="POR">Portieri</option>
          <option value="DIF">Difensori</option>
          <option value="CEN">Centrocampisti</option>
          <option value="ATT">Attaccanti</option>
        </select>
        <select id="filter-tag" class="filter-select" onchange="App.setFilter('tag', this.value)">
          <option value="ALL">Tutti i tag</option>
          <option value="sleeper">Sleeper</option>
          <option value="hype">Hype</option>
          <option value="normal">Normal</option>
        </select>
        <label class="filter-check-label">
          <input type="checkbox" id="filter-penalties" onchange="App.setFilter('penalties', this.checked)" />
          🎯 Rigoristi
        </label>
      </div>
      <div class="player-count-row">
        <span id="player-count">0 giocatori</span>
        <select id="sort-by" class="filter-select" onchange="App.setSort(this.value)">
          <option value="value_estimated">Ordina: Valore</option>
          <option value="fantavote">Ordina: Fantavoto</option>
          <option value="price_initial">Ordina: Quotazione</option>
          <option value="name">Ordina: Nome</option>
        </select>
      </div>
    </div>
    <div id="player-list" style="padding:16px 20px;">
      <div class="empty-state">Caricamento giocatori...</div>
    </div>
  </div>


  <!-- VIEW: WATCHLIST + BATTUTI -->
  <div id="view-watchlist" style="display:none;">
    <p class="wl-hint" style="padding:12px 20px 0;">Usa ⭐ 👀 ❌ nelle card per organizzare la pre-asta. Clicca 🔍 per il focus.</p>
    <div id="watchlist-list" style="padding:12px 20px;"></div>
    <div class="beaten-section">
      <div class="beaten-section-title">🔨 Giocatori battuti</div>
      <div id="beaten-list"></div>
    </div>
  </div>


  <!-- VIEW: ROSA -->
  <div id="view-squad" style="display:none;">
    <div id="squad-list" style="padding:16px 20px;"></div>
  </div>


</div>


<!-- SCRIPTS -->
<script src="./players.js?v=15"></script>
<script src="./utils.js?v=15"></script>
<script src="./scoring.js?v=1"></script>
<script src="./ui.js?v=15"></script>
<script src="./app.js?v=15"></script>


<script>
  window.addEventListener('DOMContentLoaded', function() {
    try {
      var raw = localStorage.getItem('fantacalcio_state');
      if (!raw) return;
      var d = JSON.parse(raw);
      if (d.settings && d.settings.totalBudget) { var el = document.getElementById('setting-budget'); if (el) el.value = d.settings.totalBudget; }
      if (d.settings && d.settings.formation)   { var el2 = document.getElementById('setting-formation'); if (el2) el2.value = d.settings.formation; }
    } catch(e) {}
  });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') App.closeFocus(); });
</script>


<!-- ====== SCORING ENGINE LOG ====== -->
<script>
  window.addEventListener('DOMContentLoaded', function () {

    // Attende che i giocatori siano caricati da app.js (init è async)
    // Usa un piccolo delay per essere sicuro che AppState.players sia popolato
    setTimeout(function () {

      var players = window.PLAYERS || [];
      if (!players.length || !window.Scoring) return;

      var sep  = '══════════════════════════════════════════════';
      var line = '──────────────────────────────────────────────';

      // ── Calcola tutti gli score ──
      var all = Scoring.rankPlayers(players);
      var excluded = players.length - all.length;

      console.log(sep);
      console.log('🎯 FANTASSIST — Undervalue Scoring Engine');
      console.log(sep);
      console.log('📊 ' + players.length + ' giocatori analizzati  |  ' + excluded + ' esclusi (minuti insufficienti)');
      console.log('📐 Pesi: xG 35% · xA 25% · Gol 20% · Assist 10% · Tiri 10%');
      console.log('💡 Score "value" = performance normalizzata ÷ prezzo^0.75');
      console.log(line);

      // ── TOP 10 ASSOLUTI ──
      console.log('🏆 TOP 10 UNDERVALUE ASSOLUTI');
      console.log(line);
      var top10 = all.slice(0, 10);
      top10.forEach(function (item, i) {
        var p  = item.player;
        var s  = item.score;
        var ex = item.explanation;
        var n  = String(i + 1).padStart(2, ' ');
        var nm = p.name.padEnd(16, ' ');
        var rl = p.role.padEnd(3, ' ');
        var tm = p.team.padEnd(10, ' ');
        var pr = String(p.price_initial + ' cr').padStart(6, ' ');
        var sc = 'score: ' + s.normalized.toFixed(2);
        var vl = 'value: ' + s.value.toFixed(4);
        console.log(n + '. ' + nm + ' | ' + rl + ' | ' + tm + ' | ' + pr + ' | ' + sc + ' | ' + vl + ' | ' + ex.verdict);
      });
      console.log(line);

      // ── TOP 3 PER REPARTO + BREAKDOWN ──
      var reparti = [
        { role: 'ATT', label: '⚡ ATTACCANTI' },
        { role: 'CEN', label: '🔮 CENTROCAMPISTI' },
        { role: 'DIF', label: '🛡️  DIFENSORI' },
        { role: 'POR', label: '🧤 PORTIERI' }
      ];

      reparti.forEach(function (rep) {
        var top3 = Scoring.rankPlayersByRole(players, rep.role).slice(0, 3);
        if (!top3.length) return;

        console.log('');
        console.log(line);
        console.log(rep.label + ' — TOP 3 UNDERVALUE');
        console.log(line);

        top3.forEach(function (item, i) {
          var p  = item.player;
          var s  = item.score;
          var ex = item.explanation;

          // riga riassuntiva
          var n  = String(i + 1).padStart(2, ' ');
          var nm = p.name.padEnd(16, ' ');
          var tm = p.team.padEnd(10, ' ');
          var pr = String(p.price_initial + ' cr').padStart(6, ' ');
          console.log(n + '. ' + nm + ' | ' + tm + ' | ' + pr + ' | ' + ex.verdict);

          // breakdown dettagliato
          if (ex.breakdown && ex.breakdown.length) {
            ex.breakdown.forEach(function (b) {
              var lbl  = ('   ' + b.label).padEnd(36, ' ');
              var val  = '→ ' + b.value;
              var det  = b.detail ? '  (' + b.detail + ')' : '';
              console.log(lbl + val + det);
            });
          }

          // flags
          if (ex.flags && ex.flags.length) {
            ex.flags.forEach(function (f) {
              console.log('   ' + f);
            });
          }

          // separatore leggero tra giocatori
          if (i < top3.length - 1) console.log('   · · ·');
        });
      });

      console.log('');
      console.log(line);
      console.log('✅ Scoring Engine caricato correttamente.');
      console.log('💡 Suggerimento: Scoring.rankPlayers(PLAYERS) in console per la lista completa.');
      console.log(sep);

    }, 300);
  });
</script>
<!-- ====== FINE SCORING ENGINE LOG ====== -->


<!-- ====== MINI CONSOLE DEBUG ====== -->
<style>
  #miniConsole {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    background: rgba(0,0,0,0.88);
    border-top: 1px solid #222;
    z-index: 99999;
    overflow-y: auto;
    padding: 5px 8px;
    box-sizing: border-box;
    -webkit-overflow-scrolling: touch;
  }
  #miniConsole.mc-visible { display: block; }
  #miniConsole p {
    margin: 0;
    padding: 1px 0;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.45;
    word-break: normal;
    overflow-wrap: anywhere;
    color: #4ade80;
  }
  #miniConsole p.mc-err  { color: #f87171; }
  #miniConsole p.mc-warn { color: #fbbf24; }
  #miniConsole p.mc-net  { color: #60a5fa; }
</style>

<div id="miniConsole"></div>

<script>
  (function () {
    const CLICKS  = 7;
    const TIMEOUT = 500;

    const panel = document.getElementById('miniConsole');
    let visible = false;
    let count = 0;
    let last  = 0;

    /* trigger: 7 click rapidi ovunque */
    document.addEventListener('click', function () {
      const now = Date.now();
      if (now - last > TIMEOUT) count = 0;
      last = now;
      if (++count >= CLICKS) {
        count = 0;
        visible = !visible;
        panel.classList.toggle('mc-visible', visible);
      }
    });

    /* aggiunge riga al pannello */
    function add(text, cls) {
      const t = new Date().toLocaleTimeString('it-IT');
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.textContent = t + ' › ' + text;
      panel.appendChild(p);
      if (panel.children.length > 100) panel.removeChild(panel.firstChild);
      panel.scrollTop = panel.scrollHeight;
    }

    /* intercetta console.log / warn / error */
    const _log   = console.log.bind(console);
    const _warn  = console.warn.bind(console);
    const _error = console.error.bind(console);
    console.log   = function (...a) { _log(...a);   add(a.join(' ')); };
    console.warn  = function (...a) { _warn(...a);  add(a.join(' '), 'mc-warn'); };
    console.error = function (...a) { _error(...a); add(a.join(' '), 'mc-err'); };

    /* errori JS non gestiti */
    window.addEventListener('error', function (e) {
      add('❌ ' + e.message + '  (' + (e.filename || '').split('/').pop() + ':' + e.lineno + ')', 'mc-err');
    });

  })();
</script>
<!-- ====== FINE MINI CONSOLE DEBUG ====== -->


</body>
</html>
