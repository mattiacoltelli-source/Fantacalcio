<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FantAssist</title>

  <link rel="stylesheet" href="style.css" />

  <script>
    // 🔥 CACHE BUSTER AUTOMATICO
    const v = new Date().getTime();
    function loadScript(src) {
      const s = document.createElement('script');
      s.src = src + '?v=' + v;
      s.defer = true;
      document.head.appendChild(s);
    }
  </script>
</head>

<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1>FantAssist ⚽</h1>
  </header>

  <!-- BUDGET BAR -->
  <div id="budget-bar"></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="players" onclick="App.setTab('players')">Giocatori</button>
    <button class="tab-btn" data-tab="watchlist" onclick="App.setTab('watchlist')">Watchlist</button>
    <button class="tab-btn" data-tab="squad" onclick="App.setTab('squad')">Rosa</button>
  </div>

  <!-- FILTRI -->
  <div class="filters">

    <select id="filter-role" onchange="App.setFilter('role', this.value)">
      <option value="ALL">Ruolo</option>
      <option value="POR">Portieri</option>
      <option value="DIF">Difensori</option>
      <option value="CEN">Centrocampisti</option>
      <option value="ATT">Attaccanti</option>
    </select>

    <select id="filter-tag" onchange="App.setFilter('tag', this.value)">
      <option value="ALL">Tag</option>
      <option value="normal">Normal</option>
      <option value="sleeper">Sleeper</option>
      <option value="hype">Hype</option>
    </select>

    <select id="sort-by" onchange="App.setSort(this.value)">
      <option value="value_estimated">Valore</option>
      <option value="fantavote">Fantavoto</option>
      <option value="price_initial">Prezzo iniziale</option>
      <option value="name">Nome</option>
    </select>

    <input
      type="text"
      id="search-input"
      placeholder="Cerca..."
      oninput="App.setFilter('search', this.value)"
    />

    <label class="checkbox">
      <input
        type="checkbox"
        id="filter-penalties"
        onchange="App.setFilter('penalties', this.checked)"
      />
      🎯 Rigori
    </label>

  </div>

  <!-- VIEW GIOCATORI -->
  <div id="view-players">
    <div id="player-count"></div>
    <div id="player-list"></div>
  </div>

  <!-- VIEW WATCHLIST -->
  <div id="view-watchlist" style="display:none;">
    <div id="watchlist-list"></div>
  </div>

  <!-- VIEW SQUAD -->
  <div id="view-squad" style="display:none;">
    <div id="squad-list"></div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- 🔥 SCRIPT LOAD (CON VERSIONING AUTOMATICO) -->
  <script>
    loadScript('players.js');
    loadScript('utils.js');
    loadScript('app.js');
    loadScript('ui.js');
  </script>

</body>
</html>
