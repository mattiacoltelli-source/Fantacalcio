<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="description" content="FantAssist 2025/26" />
  <title>FantAssist</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="app-container">

  <header class="app-header">
    <div class="header-top">
      <div>
        <div class="app-title">⚽ FantAssist</div>
        <div class="app-subtitle">Asta 2025 / 2026</div>
      </div>

      <div class="header-actions">
        <button onclick="App.exportBackup()">💾</button>
        <button onclick="document.getElementById('import-file').click()">📂</button>

        <input type="file" id="import-file" accept=".json" style="display:none"
          onchange="App.importBackup(this.files[0]); this.value='';" />

        <button onclick="App.resetAll()">Reset</button>
      </div>
    </div>
  </header>

  <div id="budget-bar"></div>

  <div class="settings-bar">
    <input type="number" id="setting-budget" value="250"
      onchange="App.updateBudget(parseInt(this.value))" />

    <select id="setting-formation"
      onchange="App.updateFormation(this.value)">
      <option>4-3-3</option>
      <option>3-4-3</option>
      <option>4-4-2</option>
    </select>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="players" onclick="App.setTab('players')">Giocatori</button>
    <button class="tab-btn" data-tab="watchlist" onclick="App.setTab('watchlist')">Watchlist</button>
    <button class="tab-btn" data-tab="squad" onclick="App.setTab('squad')">Rosa</button>
  </nav>

  <div id="view-players">
    <input id="search-input" placeholder="Cerca..."
      oninput="App.setFilter('search', this.value)" />

    <div id="player-count"></div>

    <div id="player-list"></div>
  </div>

  <div id="view-watchlist" style="display:none;">
    <div id="watchlist-list"></div>
  </div>

  <div id="view-squad" style="display:none;">
    <div id="squad-list"></div>
  </div>

</div>

<!-- 🐞 CONSOLE -->
<div id="mobile-console-toggle">🐞</div>

<div id="mobile-console">
  <div style="display:flex;justify-content:space-between;padding:5px;background:#111;">
    <span>Console</span>
    <div>
      <button onclick="clearConsole()">🧹</button>
      <button onclick="toggleConsole()">✖</button>
    </div>
  </div>
  <div id="console-output"></div>
</div>

<style>
#mobile-console-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:#fff;
  border-radius:50%;
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#mobile-console{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:40%;
  background:#000;
  color:#0f0;
  display:none;
  flex-direction:column;
  font-size:12px;
  z-index:9999;
}

#console-output{
  overflow:auto;
  flex:1;
  padding:6px;
}
</style>

<!-- 🔥 SCRIPTS (ORDINE + CACHE FIX) -->
<script src="./players.js?v=1"></script>
<script src="./utils.js?v=1"></script>
<script src="./ui.js?v=99"></script>
<script src="./app.js?v=1"></script>

<script>
// console UI
function toggleConsole(){
  const el = document.getElementById('mobile-console');
  el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}
document.getElementById('mobile-console-toggle').onclick = toggleConsole;

function logToConsole(type, args){
  const out = document.getElementById('console-output');
  const el = document.createElement('div');
  el.textContent = `[${type}] ` + args.join(' ');
  el.style.color = type === 'error' ? 'red' : 'lime';
  out.appendChild(el);
  out.scrollTop = out.scrollHeight;
}

function clearConsole(){
  document.getElementById('console-output').innerHTML = '';
}

['log','error'].forEach(type=>{
  const old = console[type];
  console[type] = function(...args){
    old.apply(console,args);
    logToConsole(type,args);
  }
});

// errori globali
window.onerror = (msg)=> logToConsole('error',[msg]);

window.addEventListener('unhandledrejection', e=>{
  logToConsole('error',[e.reason]);
});
</script>

</body>
</html>
